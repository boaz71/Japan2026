<title>🗾 טיול יפן 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --red:#c0392b; --dark:#1a1a2e; --gold:#e8b84b;
  --cream:#fdf6e3; --cream2:#f5ead0; --border:#e0d5b8;
  --muted:#7a7a9a; --text:#2c2c3e; --h:58px; --sb:290px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Heebo',sans-serif;direction:rtl;color:var(--text);background:var(--dark)}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;height:var(--h);background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:200;border-bottom:1px solid rgba(232,184,75,.2)}
.brand{display:flex;align-items:center;gap:10px}
.torii{font-size:26px;display:inline-block;animation:sway 3s ease-in-out infinite}
@keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
.brand h1{font-size:17px;font-weight:900;color:var(--gold);line-height:1}
.brand p{font-size:11px;color:rgba(253,246,227,.5)}
.tabs{display:flex;gap:4px}
.tab{padding:5px 13px;border-radius:18px;background:transparent;border:1px solid rgba(232,184,75,.3);color:rgba(253,246,227,.6);font-family:'Heebo',sans-serif;font-size:12px;cursor:pointer;transition:.2s}
.tab:hover{color:var(--gold);border-color:var(--gold)}
.tab.on{background:var(--red);color:#fff;border-color:var(--red)}

/* APP */
#app{display:flex;height:calc(100vh - var(--h));margin-top:var(--h)}

/* SIDEBAR */
#sb{width:var(--sb);background:var(--cream);display:flex;flex-direction:column;overflow:hidden;border-left:1px solid var(--border);flex-shrink:0}
.sb-s{padding:10px;border-bottom:1px solid var(--border)}
.sb-s input{width:100%;padding:7px 11px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-family:'Heebo',sans-serif;font-size:12px;outline:none;transition:.2s}
.sb-s input:focus{border-color:var(--red)}
.flt{padding:8px 10px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.fl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.4px}
.fr{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:3px 9px;border-radius:14px;border:1.5px solid var(--border);background:#fff;font-family:'Heebo',sans-serif;font-size:11px;color:var(--muted);cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--red);color:var(--red)}
.chip.on{background:var(--red);border-color:var(--red);color:#fff}
.favrow{display:flex;align-items:center;gap:6px;padding:7px 10px;border-bottom:1px solid var(--border);font-size:12px;cursor:pointer}
.favrow input{accent-color:var(--red);cursor:pointer}
#plist{flex:1;overflow-y:auto;padding:6px 8px}
#plist::-webkit-scrollbar{width:3px}
#plist::-webkit-scrollbar-thumb{background:var(--border)}
.pc{padding:9px 11px;border:1px solid var(--border);border-radius:8px;margin-bottom:5px;background:#fff;cursor:pointer;transition:.18s}
.pc:hover{border-color:var(--red);transform:translateX(-2px);box-shadow:0 2px 10px rgba(192,57,43,.1)}
.pc-top{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.pc-ico{font-size:15px;flex-shrink:0}
.pc-name{font-size:12px;font-weight:600;flex:1;line-height:1.3}
.pc-fav{background:none;border:none;font-size:13px;cursor:pointer;opacity:.3;transition:.15s;padding:0}
.pc-fav.on{opacity:1}
.pc-meta{display:flex;gap:5px;align-items:center}
.bdg{display:inline-block;padding:1px 6px;border-radius:9px;font-size:10px;font-weight:600}
.bdg.attraction{background:#dbeafe;color:#1d4ed8}
.bdg.hotel{background:#dcfce7;color:#166534}
.bdg.restaurant{background:#fef3c7;color:#92400e}
.pc-city{font-size:10px;color:var(--muted)}

/* PANELS */
.panel{display:none;flex:1;overflow:hidden;flex-direction:column}
.panel.on{display:flex}

/* MAP */
#map-panel{position:relative}
#map-container{width:100%;height:100%;position:relative;overflow:hidden;background:#b8d8ea;cursor:grab}
#map-container:active{cursor:grabbing}
#tile-layer{position:absolute;top:0;left:0;width:100%;height:100%}
#marker-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

/* Zoom controls */
.zc{position:absolute;bottom:20px;left:16px;display:flex;flex-direction:column;gap:2px;z-index:50}
.zb{width:32px;height:32px;background:#fff;border:1px solid var(--border);border-radius:7px;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);box-shadow:0 1px 5px rgba(0,0,0,.15);transition:.15s;line-height:1}
.zb:hover{background:var(--cream);border-color:var(--red)}
.attr{position:absolute;bottom:6px;right:8px;font-size:10px;color:#555;background:rgba(255,255,255,.7);padding:2px 5px;border-radius:3px;z-index:50}

/* MARKER */
.marker{position:absolute;transform:translate(-50%,-100%);cursor:pointer;pointer-events:all;transition:transform .15s;z-index:30;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3))}
.marker:hover{transform:translate(-50%,-100%) scale(1.2);z-index:40}
.marker svg{display:block}

/* POPUP */
#popup{position:absolute;z-index:100;background:#fff;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.2);min-width:230px;max-width:260px;padding:13px 15px;display:none;direction:rtl;font-family:'Heebo',sans-serif;pointer-events:all}
#popup::after{content:'';position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);border:9px solid transparent;border-top-color:#fff;border-bottom:none}
.pu-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.pu-fav{background:none;border:none;font-size:18px;cursor:pointer;opacity:.3;transition:.15s;padding:0;line-height:1}
.pu-fav.on{opacity:1}
.pu-close{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:0;line-height:1}
.pu-name{font-size:13px;font-weight:700;margin-bottom:5px}
.pu-note{font-size:11px;color:#666;line-height:1.5;margin-bottom:6px}
.pu-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;font-size:10px}
.pu-meta span{background:#f3f4f6;padding:2px 7px;border-radius:6px}
.pu-link{font-size:11px;color:var(--red);font-weight:600;text-decoration:none}
.pu-link:hover{text-decoration:underline}

/* ITINERARY */
#itin-panel{flex-direction:row}
#day-nav{width:175px;flex-shrink:0;background:var(--cream2);border-left:1px solid var(--border);overflow-y:auto;padding:6px 5px}
#day-nav::-webkit-scrollbar{width:3px}
#day-nav::-webkit-scrollbar-thumb{background:var(--border)}
.dni{padding:7px 9px;border-radius:7px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:.15s}
.dni:hover{background:#fff;border-color:var(--border)}
.dni.on{background:var(--dark);color:#fff}
.dni .dd{font-size:11px;font-weight:700;display:block}
.dni .dc{font-size:10px;opacity:.65;display:block;margin-top:1px}
.dni .dt{font-size:9px;opacity:.8;display:block;margin-top:2px;line-height:1.3}
#day-det{flex:1;overflow-y:auto;padding:18px 20px;background:var(--cream)}
.dd-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted)}
.dd-empty span{font-size:44px;opacity:.25}
.d-title{font-size:19px;font-weight:900;color:var(--dark)}
.d-theme{font-size:13px;color:var(--red);font-weight:600;margin-top:3px}
.d-notes{font-size:12px;color:var(--muted);margin-top:7px;line-height:1.55}
.d-div{border:none;border-top:2px solid var(--border);margin:12px 0}
.stats-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.sbox{background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-size:11px}
.sbox strong{display:block;font-size:17px;color:var(--dark);line-height:1.1}
.dp-list{display:flex;flex-direction:column;gap:6px}
.dpi{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;background:#fff;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:.15s}
.dpi:hover{border-color:var(--red)}
.dpi-n{width:22px;height:22px;border-radius:50%;background:var(--dark);color:#fff;font-size:10px;font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
.dpi-name{font-size:12px;font-weight:600}
.dpi-note{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}

/* WEATHER */
#wx-panel{overflow-y:auto;padding:18px 20px;background:var(--cream)}
.wx-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.wx-hdr h2{font-size:17px;font-weight:700}
.wx-cities{display:flex;gap:7px}
.wxcb{padding:5px 14px;border-radius:18px;border:1.5px solid var(--border);background:#fff;font-family:'Heebo',sans-serif;font-size:12px;cursor:pointer;transition:.15s}
.wxcb:hover{border-color:var(--red)}
.wxcb.on{background:var(--red);color:#fff;border-color:var(--red)}
.wx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:10px;margin-bottom:16px}
.wxc{background:#fff;border:1px solid var(--border);border-radius:11px;padding:14px 12px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06);animation:fu .35s ease both}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.wxdate{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:7px}
.wxicon{font-size:34px;margin-bottom:6px}
.wxdesc{font-size:11px;color:var(--muted);margin-bottom:6px}
.wxtemp{font-size:15px;font-weight:700;color:var(--dark)}
.wxtemp span{font-weight:300;color:var(--muted)}
.wxhum{font-size:10px;color:var(--muted);margin-top:4px}
.wx-note{background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:9px 13px;font-size:12px;color:#92400e;line-height:1.55}

/* ── BUDGET ─────────────────────────────── */
#budget-panel{overflow-y:auto;background:var(--cream)}
#budget-content{padding:20px;max-width:960px;margin:0 auto}
.bgt-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.bgt-hdr h2{font-size:18px;font-weight:800;color:var(--dark)}
.bgt-currency{display:flex;gap:6px}
.bgt-cur-btn{padding:5px 14px;border-radius:18px;border:1.5px solid var(--border);background:#fff;font-family:"Heebo",sans-serif;font-size:12px;cursor:pointer;transition:.15s}
.bgt-cur-btn:hover{border-color:var(--red)}
.bgt-cur-btn.on{background:var(--red);color:#fff;border-color:var(--red)}
.bgt-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.bgt-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.bgt-card.total{background:var(--dark);color:#fff;border-color:var(--dark)}
.bgt-card.total .bc-label{color:rgba(255,255,255,.6)}
.bc-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.bc-amount{font-size:22px;font-weight:900;color:var(--dark);line-height:1}
.bgt-card.total .bc-amount{color:var(--gold)}
.bc-sub{font-size:11px;color:var(--muted);margin-top:4px}
.bgt-card.total .bc-sub{color:rgba(255,255,255,.5)}
.bgt-section{margin-bottom:24px}
.bgt-section-title{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:10px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.cat-item{background:#fff;border:1px solid var(--border);border-radius:9px;padding:11px 13px;display:flex;align-items:center;gap:10px}
.cat-ico{font-size:20px;flex-shrink:0}
.cat-info{flex:1}
.cat-name{font-size:12px;font-weight:600}
.cat-desc{font-size:10px;color:var(--muted);margin-top:1px}
.cat-price{font-size:13px;font-weight:700;color:var(--dark)}
.cat-price-sub{font-size:10px;color:var(--muted)}
.bgt-bar-wrap{background:#f0ead0;border-radius:8px;height:10px;margin-bottom:16px;overflow:hidden;display:flex}
.bgt-bar-seg{height:100%;transition:.5s}
.day-table{width:100%;border-collapse:collapse;font-size:12px}
.day-table th{background:var(--dark);color:#fff;padding:8px 10px;text-align:right;font-weight:600;font-size:11px}
.day-table th:last-child,.day-table td:last-child{text-align:left}
.day-table tr:nth-child(even){background:#f9f5ea}
.day-table tr:hover{background:#fef3c7}
.day-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.day-table td.total-col{font-weight:700}
.day-table tfoot td{background:var(--dark);color:var(--gold);font-weight:700;padding:9px 10px}
.day-city-tag{display:inline-block;padding:1px 7px;border-radius:8px;font-size:10px;font-weight:600}
.day-city-tag.Tokyo{background:#dbeafe;color:#1d4ed8}
.day-city-tag.Kyoto{background:#fef3c7;color:#92400e}
.day-city-tag.Osaka{background:#dcfce7;color:#166534}
.day-city-tag.Hakone,.day-city-tag.Nara{background:#f3e8ff;color:#6b21a8}
.bgt-tips{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.bgt-tips h3{font-size:13px;font-weight:700;margin-bottom:8px}
.tip-item{display:flex;gap:8px;margin-bottom:7px;font-size:12px;line-height:1.5}
.tip-item:last-child{margin-bottom:0}
.tip-ico{flex-shrink:0;font-size:15px}
.tip-item strong{color:var(--red)}
/* countdown */
.countdown{display:flex;align-items:center;gap:8px;background:rgba(232,184,75,.12);border:1px solid rgba(232,184,75,.25);border-radius:20px;padding:5px 14px}
.cd-num{font-size:20px;font-weight:900;color:var(--gold);line-height:1}
.cd-label{font-size:10px;color:rgba(253,246,227,.6);line-height:1.3}
.cd-label strong{display:block;color:rgba(253,246,227,.9);font-size:11px}
.countdown.arrived{background:rgba(39,174,96,.15);border-color:rgba(39,174,96,.35)}
.countdown.arrived .cd-num{color:#2ecc71}







.train-card-wrap{margin-bottom:9px}
.train-card{cursor:pointer;margin-bottom:0!important;position:relative;transition:.15s}
.train-card:hover{border-color:var(--red)}
.train-chev{position:absolute;left:10px;bottom:8px;font-size:12px;color:var(--muted);transition:transform .25s}
.train-detail-panel{max-height:0;overflow:hidden;background:#fff;border:1px solid var(--border);border-top:none;border-radius:0 0 11px 11px;transition:max-height .3s ease,padding .3s ease;padding:0 15px}
.train-detail-panel.open{max-height:600px;padding:14px 15px}
.trd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.trd-box{background:var(--cream);border-radius:8px;padding:8px 10px;text-align:center}
.trd-label{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:3px}
.trd-val{font-size:12px;font-weight:700;color:var(--dark);line-height:1.3}
.trd-path-title{font-size:12px;font-weight:700;color:var(--dark);margin-bottom:8px}
.trd-path{padding-right:4px;margin-bottom:12px}
.trd-step{display:flex;align-items:center;gap:9px}
.trd-dot{width:11px;height:11px;border-radius:50%;background:#fff;border:2.5px solid var(--red);flex-shrink:0}
.trd-dot.last{background:var(--red)}
.trd-step-txt{font-size:12px;color:var(--text);padding:3px 0}
.trd-connector{width:2px;height:14px;background:var(--border);margin-right:4px}
.trd-notes{background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:9px 12px;font-size:11px;color:#92400e;line-height:1.55}





/* ── PACKING LIST ───────────────────────── */
#packing-panel{overflow-y:auto;background:var(--cream)}
#packing-content{padding:18px;max-width:760px;margin:0 auto}
.pk-h2{font-size:18px;font-weight:800;color:var(--dark);margin-bottom:4px}
.pk-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.pk-progress-wrap{background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:16px}
.pk-progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pk-progress-label{font-size:13px;font-weight:700;color:var(--dark)}
.pk-progress-count{font-size:12px;color:var(--red);font-weight:700}
.pk-progress-bar{height:8px;background:#f0ead0;border-radius:5px;overflow:hidden}
.pk-progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--red));transition:width .4s ease}
.pk-cat{margin-bottom:18px}
.pk-cat-title{font-size:14px;font-weight:800;color:var(--dark);margin-bottom:9px;display:flex;align-items:center;gap:7px}
.pk-item{background:#fff;border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:11px;transition:.15s}
.pk-item.checked{background:#f0f9f0;border-color:#bbe5bb}
.pk-check{width:24px;height:24px;border-radius:7px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;transition:.15s;background:#fff}
.pk-check.on{background:#27ae60;border-color:#27ae60}
.pk-item-name{flex:1;font-size:13px;color:var(--text)}
.pk-item.checked .pk-item-name{text-decoration:line-through;color:var(--muted)}
.pk-del{background:none;border:none;color:#c0392b;font-size:14px;cursor:pointer;opacity:.4;padding:2px 4px;flex-shrink:0}
.pk-del:hover{opacity:1}
.pk-add-row{display:flex;gap:7px;margin-top:8px}
.pk-add-input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:9px 11px;font-family:'Heebo',sans-serif;font-size:13px;outline:none}
.pk-add-input:focus{border-color:var(--red)}
.pk-add-btn{background:var(--red);color:#fff;border:none;border-radius:8px;padding:0 16px;font-family:'Heebo',sans-serif;font-size:18px;font-weight:700;cursor:pointer}
.pk-reset{width:100%;margin-top:6px;padding:9px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-family:'Heebo',sans-serif;font-size:12px;color:var(--muted);cursor:pointer}
.pk-reset:hover{border-color:#c0392b;color:#c0392b}

/* ── PHRASEBOOK ─────────────────────────── */
#phrases-panel{overflow-y:auto;background:var(--cream)}
#phrases-content{padding:18px;max-width:760px;margin:0 auto}
.ph-h2{font-size:18px;font-weight:800;color:var(--dark);margin-bottom:4px}
.ph-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.ph-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.ph-cat{padding:6px 14px;border-radius:18px;border:1.5px solid var(--border);background:#fff;font-family:'Heebo',sans-serif;font-size:12px;cursor:pointer;transition:.15s;white-space:nowrap}
.ph-cat:hover{border-color:var(--red)}
.ph-cat.on{background:var(--red);color:#fff;border-color:var(--red)}
.ph-item{background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
.ph-info{flex:1;min-width:0}
.ph-heb{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:3px}
.ph-jp{font-size:15px;color:var(--red);font-weight:600;direction:ltr;text-align:right}
.ph-hp{font-size:12px;color:#1d4ed8;margin-top:3px;font-weight:600}
.ph-roma{font-size:11px;color:var(--muted);direction:ltr;text-align:right;margin-top:2px;font-style:italic}
.ph-play{flex-shrink:0;width:44px;height:44px;border-radius:50%;background:var(--dark);color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;-webkit-tap-highlight-color:transparent}
.ph-play:hover{background:var(--red)}
.ph-play.playing{background:var(--red);animation:phpulse 1s ease infinite}
@keyframes phpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.ph-novoice{background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:10px 13px;font-size:12px;color:#92400e;line-height:1.55;margin-bottom:14px}

/* ── JOURNAL ────────────────────────────── */
#journal-panel{overflow-y:auto;background:var(--cream)}
#journal-content{padding:18px;max-width:760px;margin:0 auto}
.jr-h2{font-size:18px;font-weight:800;color:var(--dark);margin-bottom:4px}
.jr-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.jr-newbtns{display:flex;gap:8px;margin-bottom:16px}
.jr-newbtn{flex:1;padding:12px;border-radius:12px;border:1.5px solid var(--border);background:#fff;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;color:var(--dark);cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:7px}
.jr-newbtn:hover{border-color:var(--red);color:var(--red)}
.jr-newbtn .ico{font-size:18px}
/* editor */
.jr-editor{background:#fff;border:1.5px solid var(--gold);border-radius:14px;padding:14px;margin-bottom:16px;display:none}
.jr-editor.on{display:block}
.jr-editor input.jr-title{width:100%;border:none;border-bottom:1.5px solid var(--border);padding:6px 2px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;outline:none;margin-bottom:10px;background:none}
.jr-editor textarea.jr-text{width:100%;min-height:90px;border:1px solid var(--border);border-radius:8px;padding:10px;font-family:'Heebo',sans-serif;font-size:13px;outline:none;resize:vertical;line-height:1.6}
.jr-editor textarea.jr-text:focus{border-color:var(--red)}
/* canvas drawing */
.jr-canvas-wrap{position:relative;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fffef9;touch-action:none}
.jr-canvas-wrap.hidden{display:none}
.jr-canvas-tools{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.jr-tool{width:30px;height:30px;border-radius:7px;border:1.5px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;padding:0}
.jr-tool.on{border-color:var(--red);background:#fff5f3}
.jr-color{width:24px;height:24px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1.5px var(--border);cursor:pointer}
.jr-color.on{box-shadow:0 0 0 2.5px var(--red)}
.jr-pen-hint{font-size:10px;color:var(--muted);margin-bottom:6px}
.jr-editor-actions{display:flex;gap:8px;margin-top:12px}
.jr-save{flex:1;padding:10px;border-radius:9px;border:none;background:var(--red);color:#fff;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.jr-cancel{padding:10px 16px;border-radius:9px;border:1.5px solid var(--border);background:#fff;font-family:'Heebo',sans-serif;font-size:13px;cursor:pointer;color:var(--muted)}
/* entries */
.jr-entry{background:#fff;border:1px solid var(--border);border-radius:13px;padding:14px 16px;margin-bottom:11px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.jr-entry-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.jr-entry-title{font-size:14px;font-weight:700;color:var(--dark)}
.jr-entry-date{font-size:11px;color:var(--muted)}
.jr-entry-del{background:none;border:none;color:#c0392b;font-size:14px;cursor:pointer;opacity:.5;padding:0}
.jr-entry-del:hover{opacity:1}
.jr-entry-text{font-size:13px;color:var(--text);line-height:1.65;white-space:pre-wrap;word-break:break-word}
.jr-entry-img{max-width:100%;border-radius:8px;border:1px solid var(--border);margin-top:8px}
.jr-empty{text-align:center;padding:40px 20px;color:var(--muted)}
.jr-empty .big{font-size:48px;opacity:.25;display:block;margin-bottom:10px}
.jr-tag{display:inline-block;font-size:10px;font-weight:600;padding:1px 8px;border-radius:8px;margin-left:6px}
.jr-tag.text{background:#dbeafe;color:#1d4ed8}
.jr-tag.draw{background:#fce7f3;color:#be185d}

/* ── HOME DASHBOARD ─────────────────────── */
#home-panel{overflow-y:auto;background:linear-gradient(180deg,#fdf6e3,#f5ead0)}
#home-content{padding:18px;max-width:900px;margin:0 auto}
.dash-hero{background:linear-gradient(135deg,#1a1a2e,#2c2c4e);border-radius:18px;padding:22px 20px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.dash-hero::after{content:'⛩';position:absolute;left:-10px;bottom:-20px;font-size:90px;opacity:.07}
.dash-hero-title{font-size:15px;color:rgba(232,184,75,.85);font-weight:600;margin-bottom:4px}
.dash-hero-count{font-size:46px;font-weight:900;color:var(--gold);line-height:1}
.dash-hero-sub{font-size:13px;color:rgba(255,255,255,.7);margin-top:6px}
.dash-hero-dates{font-size:12px;color:rgba(255,255,255,.5);margin-top:10px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.dash-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:15px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.dash-card.full{grid-column:1/-1}
.dash-card-h{font-size:13px;font-weight:800;color:var(--dark);margin-bottom:11px;display:flex;align-items:center;gap:6px}
.dash-card-h .more{margin-right:auto;font-size:11px;color:var(--red);font-weight:600;cursor:pointer}
/* flights mini */
.dash-flight{display:flex;align-items:center;justify-content:space-between;padding:8px 0;font-size:12px}
.dash-flight+.dash-flight{border-top:1px solid var(--border)}
.dfl-dir{font-size:11px;color:var(--muted);width:54px}
.dfl-route{font-weight:700;color:var(--dark);flex:1;text-align:center}
.dfl-time{color:var(--muted);font-size:11px;text-align:left}
/* route mini */
.dash-route{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.drt-city{background:var(--cream);border:1px solid var(--border);border-radius:14px;padding:4px 11px;font-size:12px;font-weight:600;color:var(--dark)}
.drt-arrow{color:var(--muted);font-size:11px}
.drt-dates{font-size:11px;color:var(--muted);margin-top:8px}
/* budget mini */
.dash-budget-big{font-size:26px;font-weight:900;color:var(--dark);line-height:1}
.dash-budget-sub{font-size:12px;color:var(--muted);margin-top:3px}
.dash-budget-pp{font-size:13px;color:var(--red);font-weight:700;margin-top:6px}
/* weather mini */
.dash-wx{display:flex;align-items:center;gap:12px}
.dash-wx-ico{font-size:38px}
.dash-wx-temp{font-size:22px;font-weight:800;color:var(--dark)}
.dash-wx-desc{font-size:12px;color:var(--muted)}
/* shortcuts */
.dash-shortcuts{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.dash-sc{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 6px;text-align:center;cursor:pointer;transition:.15s}
.dash-sc:hover{border-color:var(--red);transform:translateY(-2px);box-shadow:0 4px 12px rgba(192,57,43,.12)}
.dash-sc-ico{font-size:24px;display:block;margin-bottom:4px}
.dash-sc-label{font-size:11px;font-weight:600;color:var(--text)}

/* ── TRANSPORT ──────────────────────────── */
#transport-panel{overflow-y:auto;background:var(--cream)}
#transport-content{padding:20px;max-width:960px;margin:0 auto}
.tr-h2{font-size:18px;font-weight:800;color:var(--dark);margin-bottom:16px}
.tr-section-title{font-size:14px;font-weight:700;color:var(--dark);margin:22px 0 10px;display:flex;align-items:center;gap:7px}
.flight-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:0;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.flight-top{background:linear-gradient(135deg,#1a1a2e,#2c2c4e);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.flight-no{font-size:13px;font-weight:700;color:var(--gold)}
.flight-airline{font-size:12px;opacity:.7}
.flight-body{padding:16px}
.flight-route{display:flex;align-items:center;justify-content:space-between;gap:10px}
.fr-end{text-align:center;flex:1}
.fr-code{font-size:26px;font-weight:900;color:var(--dark);line-height:1}
.fr-city{font-size:12px;color:var(--muted);margin-top:2px}
.fr-time{font-size:16px;font-weight:700;color:var(--dark);margin-top:6px}
.fr-date{font-size:11px;color:var(--muted);margin-top:1px}
.fr-mid{flex:1.2;text-align:center;position:relative}
.fr-dur{font-size:11px;color:var(--muted);margin-bottom:4px}
.fr-line{height:2px;background:repeating-linear-gradient(90deg,var(--border) 0 6px,transparent 6px 10px);position:relative}
.fr-plane{font-size:18px}
.flight-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.fm-item{background:var(--cream);border-radius:8px;padding:5px 11px;font-size:11px;color:var(--text)}
.fm-item strong{color:var(--dark)}
.train-card{background:#fff;border:1px solid var(--border);border-radius:11px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
.train-ico{font-size:24px;flex-shrink:0}
.train-info{flex:1}
.train-route{font-size:13px;font-weight:700;color:var(--dark)}
.train-detail{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.5}
.train-time{text-align:left;flex-shrink:0}
.train-dur{font-size:13px;font-weight:700;color:var(--red)}
.train-cost{font-size:11px;color:var(--muted);margin-top:1px}
.local-card{background:#fff;border:1px solid var(--border);border-radius:11px;padding:13px 15px;margin-bottom:9px}
.local-top{display:flex;align-items:center;gap:9px;margin-bottom:5px}
.local-ico{font-size:20px}
.local-name{font-size:13px;font-weight:700;color:var(--dark)}
.local-desc{font-size:12px;color:var(--muted);line-height:1.55}
.tr-tip{background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e;line-height:1.55;margin-top:6px}

// ════════════════════════════════════════════════════
//  SLIPPY MAP ENGINE — pure JS, no Leaflet
// ════════════════════════════════════════════════════

// Tile/projection helpers
const TILE_SIZE = 256;

function lon2tile(lon, zoom) { return Math.floor((lon + 180) / 360 * Math.pow(2, zoom)); }
function lat2tile(lat, zoom) {
  return Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, zoom));
}
function tile2lon(x, zoom) { return x / Math.pow(2, zoom) * 360 - 180; }
function tile2lat(y, zoom) {
  const n = Math.PI - 2 * Math.PI * y / Math.pow(2, zoom);
  return 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
}
// lat/lng → pixel offset from top-left of the tile grid origin
function latLngToPixel(lat, lng, zoom) {
  const x = (lng + 180) / 360 * Math.pow(2, zoom) * TILE_SIZE;
  const sinLat = Math.sin(lat * Math.PI / 180);
  const y = (0.5 - Math.log((1 + sinLat) / (1 - sinLat)) / (4 * Math.PI)) * Math.pow(2, zoom) * TILE_SIZE;
  return { x, y };
}

// Map state
let MAP = {
  zoom: 6,
  // Center in pixel coords at current zoom
  cx: 0, cy: 0,
  // Container size
  w: 0, h: 0,
  dragging: false,
  dragStartX: 0, dragStartY: 0,
  dragStartCX: 0, dragStartCY: 0,
  tileCache: {},
  activePopupId: null,
};

  Tokyo:  { lat:35.68, lng:139.75, zoom:12 },

  Osaka:  { lat:34.69, lng:135.50, zoom:13 },
  Nara:   { lat:34.68, lng:135.83, zoom:13 },
};

function initMapState(lat, lng, zoom) {
  const p = latLngToPixel(lat, lng, zoom);
  MAP.zoom = zoom;
  MAP.cx = p.x;
  MAP.cy = p.y;
}

function render() {
  const container = document.getElementById('map-container');
  MAP.w = container.clientWidth;
  MAP.h = container.clientHeight;
  renderTiles();
  renderMarkers();
  renderPolyline();
}

// tile servers — rotate for parallel loading
const TILE_SERVERS = [
  'https://maps.wikimedia.org/osm-intl',
];
// גיבוי — Carto Voyager (תוויות מקומיות)
const TILE_FALLBACK = 'https://a.basemaps.cartocdn.com/rastertiles/voyager';
let tileServerIdx = 0;

function tileUrl(z, x, y) {
  const s = TILE_SERVERS[tileServerIdx % TILE_SERVERS.length];
  tileServerIdx++;
  return `${s}/${z}/${x}/${y}.png`;
}

function renderTiles() {
  const layer = document.getElementById('tile-layer');
  const z = Math.round(MAP.zoom);
  const scale = Math.pow(2, z);
  const worldSize = scale * TILE_SIZE;
  // פינת ה-viewport בקואורדינטות פיקסל עולמיות
  const originX = MAP.cx - MAP.w / 2;
  const originY = MAP.cy - MAP.h / 2;
  // טווח האריחים שצריך להציג
  const minTileX = Math.floor(originX / TILE_SIZE);
  const minTileY = Math.floor(originY / TILE_SIZE);
  const maxTileX = Math.floor((originX + MAP.w) / TILE_SIZE);
  const maxTileY = Math.floor((originY + MAP.h) / TILE_SIZE);

  let html = '';
  for (let tx = minTileX; tx <= maxTileX; tx++) {
    for (let ty = minTileY; ty <= maxTileY; ty++) {
      // עיטוף אופקי (wrap) + בדיקת גבולות אנכיים
      let wx = ((tx % scale) + scale) % scale;
      if (ty < 0 || ty >= scale) continue;
      const screenX = tx * TILE_SIZE - originX;
      const screenY = ty * TILE_SIZE - originY;
      const s = TILE_SERVERS[(tx + ty) % TILE_SERVERS.length];
      const url = s + '/' + z + '/' + wx + '/' + ty + '.png';
      const fb = TILE_FALLBACK + '/' + z + '/' + wx + '/' + ty + '.png';
      html += '<img src="' + url + '" width="' + TILE_SIZE + '" height="' + TILE_SIZE +
        '" style="position:absolute;left:' + screenX + 'px;top:' + screenY +
        'px;width:' + TILE_SIZE + 'px;height:' + TILE_SIZE + 'px;pointer-events:none" ' +
        'loading="eager" draggable="false" ' +
        'onerror="if(!this.dataset.fb){this.dataset.fb=1;this.src=\'' + fb + '\'}else{this.style.display=\'none\'}"/>';
    }
  }
  layer.innerHTML = html;
}

// ── MARKERS ──────────────────────────────────────────
let dayPolylineCoords = null;
let filteredIds = new Set(PLACES.map(p => p.id));

function markerSVG(type, isFav) {
  const colors = {attraction:'#1d4ed8', hotel:'#166534', restaurant:'#92400e'};
  const emojis = {attraction:'🏯', hotel:'🏨', restaurant:'🍜'};
  const col = colors[type] || '#555';
  const fav = isFav ? '<text x="12" y="-11" font-size="9" style="pointer-events:none">❤️</text>' : '';
  return `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="-14 -18 28 36" style="overflow:visible">
    <path d="M0-18C-7.2-18-12-12.5-12-6C-12 4 0 18 0 18C0 18 12 4 12-6C12-12.5 7.2-18 0-18Z"
      fill="${col}" opacity="0.92" stroke="white" stroke-width="1.5"/>
    <circle cy="-6" r="5.5" fill="white" opacity="0.95"/>
    <text x="0" y="-2.5" font-size="7.5" text-anchor="middle" dominant-baseline="middle" style="pointer-events:none">${emojis[type]||'•'}</text>
    ${fav}
  </svg>`;
}

function renderMarkers() {
  const layer = document.getElementById('marker-layer');
  const tileOriginX = MAP.cx - MAP.w / 2;
  const tileOriginY = MAP.cy - MAP.h / 2;

  layer.innerHTML = PLACES.map(p => {
    const px = latLngToPixel(p.lat, p.lng, MAP.zoom);
    const sx = px.x - tileOriginX;
    const sy = px.y - tileOriginY;
    const dimmed = !filteredIds.has(p.id);
    const isActive = MAP.activePopupId === p.id;
    return `<div class="marker" data-id="${p.id}"
      style="left:${sx}px;top:${sy}px;opacity:${dimmed?0.2:1};transform:translate(-50%,-100%)${isActive?' scale(1.25)':''}"
      onclick="clickMarker('${p.id}')">${markerSVG(p.type, favorites.has(p.id))}</div>`;
  }).join('');
}

// ── POLYLINE ─────────────────────────────────────────
function renderPolyline() {
  const svg = document.getElementById('svg-overlay');
  if (!dayPolylineCoords || dayPolylineCoords.length < 2) { svg.innerHTML=''; return; }
  const tileOriginX = MAP.cx - MAP.w / 2;
  const tileOriginY = MAP.cy - MAP.h / 2;

  const pts = dayPolylineCoords.map(([lat,lng]) => {
    const px = latLngToPixel(lat, lng, MAP.zoom);
    return `${px.x - tileOriginX},${px.y - tileOriginY}`;
  }).join(' ');

  svg.innerHTML = `<polyline points="${pts}" fill="none" stroke="#c0392b" stroke-width="3" opacity="0.8" stroke-dasharray="8,5" stroke-linecap="round"/>`;
}

// ── PAN & ZOOM ────────────────────────────────────────
function setupEvents() {
  const mc = document.getElementById('map-container');

  mc.addEventListener('mousedown', e => {
    if (e.target.closest('.marker') || e.target.closest('#popup')) return;
    MAP.dragging = true;
    MAP.dragStartX = e.clientX; MAP.dragStartY = e.clientY;
    MAP.dragStartCX = MAP.cx;   MAP.dragStartCY = MAP.cy;
    closePopup();
  });
  window.addEventListener('mousemove', e => {
    if (!MAP.dragging) return;
    MAP.cx = MAP.dragStartCX - (e.clientX - MAP.dragStartX);
    MAP.cy = MAP.dragStartCY - (e.clientY - MAP.dragStartY);
    render();
  });
  window.addEventListener('mouseup', () => { MAP.dragging = false; });

  mc.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY < 0 ? 1 : -1;
    zoomAt(e.clientX - mc.getBoundingClientRect().left,
            e.clientY - mc.getBoundingClientRect().top, delta);
  }, {passive: false});

  // Touch
  let lastTouchDist = 0, lastTouchMid = null;
  mc.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      MAP.dragging = true;
      MAP.dragStartX = e.touches[0].clientX; MAP.dragStartY = e.touches[0].clientY;
      MAP.dragStartCX = MAP.cx; MAP.dragStartCY = MAP.cy;
    }
    if (e.touches.length === 2) {
      MAP.dragging = false;
      lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    }
  }, {passive:true});
  mc.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && MAP.dragging) {
      MAP.cx = MAP.dragStartCX - (e.touches[0].clientX - MAP.dragStartX);
      MAP.cy = MAP.dragStartCY - (e.touches[0].clientY - MAP.dragStartY);
      render();
    }
    if (e.touches.length === 2) {
      const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const mid = { x: (e.touches[0].clientX + e.touches[1].clientX) / 2, y: (e.touches[0].clientY + e.touches[1].clientY) / 2 };
      const rect = document.getElementById('map-container').getBoundingClientRect();
      if (d > lastTouchDist + 5)      zoomAt(mid.x - rect.left, mid.y - rect.top,  1);
      else if (d < lastTouchDist - 5) zoomAt(mid.x - rect.left, mid.y - rect.top, -1);
      lastTouchDist = d;
    }
  }, {passive: false});
  mc.addEventListener('touchend', () => { MAP.dragging = false; });

  window.addEventListener('resize', () => render());
}

function zoomAt(screenX, screenY, delta) {
  const newZoom = Math.max(4, Math.min(18, MAP.zoom + delta));
  if (newZoom === MAP.zoom) return;
  // keep the point under cursor fixed
  const tileOriginX = MAP.cx - MAP.w / 2;
  const tileOriginY = MAP.cy - MAP.h / 2;
  const worldX = tileOriginX + screenX;
  const worldY = tileOriginY + screenY;
  const scale = Math.pow(2, newZoom - MAP.zoom);
  MAP.cx = worldX * scale - screenX + MAP.w / 2;
  MAP.cy = worldY * scale - screenY + MAP.h / 2;
  MAP.zoom = newZoom;
  render();
}

window.doZoom = function(delta) {
  zoomAt(MAP.w / 2, MAP.h / 2, delta);
};

  // Position popup above marker on screen
  const tileOriginX = MAP.cx - MAP.w / 2;
  const tileOriginY = MAP.cy - MAP.h / 2;
  const px = latLngToPixel(p.lat, p.lng, MAP.zoom);
  const sx = px.x - tileOriginX;
  const sy = px.y - tileOriginY;

  const popup = document.getElementById('popup');
  popup.style.display = 'block';
  const pw = popup.offsetWidth  || 250;
  const ph = popup.offsetHeight || 160;
  let left = sx - pw / 2;
  let top  = sy - ph - 44;
  left = Math.max(4, Math.min(MAP.w - pw - 4, left));
  if (top < 4) top = sy + 14;
  popup.style.left = left + 'px';
  popup.style.top  = top  + 'px';
  render();
};

function getFiltered() {
  return PLACES.filter(p => {
    if (filters.city !== 'all' && p.city !== filters.city) return false;
    if (filters.type !== 'all' && p.type !== filters.type) return false;
    if (filters.fav && !favorites.has(p.id)) return false;
    if (filters.q) {
      const q = filters.q.toLowerCase();
      if (!p.name.toLowerCase().includes(q) && !p.note.toLowerCase().includes(q)) return false;

    return true;

function calcDist(ids) {
  if (ids.length < 2) return 0;
  let t = 0;
  for (let i=0; i<ids.length-1; i++) {
    const a=PLACES.find(p=>p.id===ids[i]), b=PLACES.find(p=>p.id===ids[i+1]);
    if(a&&b){
      const R=6371,dL=(b.lat-a.lat)*Math.PI/180,dN=(b.lng-a.lng)*Math.PI/180;
      const x=Math.sin(dL/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dN/2)**2;
      t+=R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
    }
  }
  return Math.round(t*10)/10;
}

window.toggleTrain = function(i){

  if (!panel) return;
  var isOpen = panel.classList.contains('open');
  // סגור את כולם
  document.querySelectorAll('.train-detail-panel').forEach(function(p){ p.classList.remove('open'); });
  document.querySelectorAll('.train-chev').forEach(function(c){ c.style.transform=''; });
  // פתח את הנבחר אם היה סגור
  if (!isOpen) {
    panel.classList.add('open');

  }
};

var packingState = JSON.parse(localStorage.getItem('jp_packing') || 'null');

function initPacking(){
  if (packingState) return;
  // אתחל מהברירת מחדל
  packingState = { items: [], checked: {} };
  var id = 1;
  Object.keys(PACKING_DEFAULT).forEach(function(cat){
    PACKING_DEFAULT[cat].forEach(function(name){
      packingState.items.push({ id: id++, cat: cat, name: name });
    });
  });
  packingState.nextId = id;
  savePacking();
}

function savePacking(){ localStorage.setItem('jp_packing', JSON.stringify(packingState)); }

function renderPacking(){
  initPacking();
  var cats = {};
  packingState.items.forEach(function(it){
    if (!cats[it.cat]) cats[it.cat] = [];
    cats[it.cat].push(it);
  });

function escapeJs(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

window.pkToggle = function(id){
  packingState.checked[id] = !packingState.checked[id];
  savePacking(); renderPacking();
};
window.pkDel = function(id){
  packingState.items = packingState.items.filter(function(it){ return it.id !== id; });
  delete packingState.checked[id];
  savePacking(); renderPacking();
};
window.pkAdd = function(input, cat){
  var val = input.value.trim();
  if (!val) return;
  packingState.items.push({ id: packingState.nextId++, cat: cat, name: val });
  savePacking(); renderPacking();
};
window.pkAddBtn = function(btn, cat){
  var input = btn.previousElementSibling;
  window.pkAdd(input, cat);
};
window.pkReset = function(){

};

var phActiveCat = "\u05d1\u05e1\u05d9\u05e1\u05d9";
var jpVoice = null;

function loadJpVoice(){
  if (!('speechSynthesis' in window)) return;
  var voices = speechSynthesis.getVoices();
  jpVoice = voices.find(function(v){ return v.lang === 'ja-JP' || v.lang.indexOf('ja') === 0; }) || null;
}
if ('speechSynthesis' in window){
  loadJpVoice();
  speechSynthesis.onvoiceschanged = loadJpVoice;
}

window.phSpeak = function(jp, btn){
  if (!('speechSynthesis' in window)){
    alert('\u05d4\u05d3\u05e4\u05d3\u05e4\u05df \u05dc\u05d0 \u05ea\u05d5\u05de\u05da \u05d1\u05d4\u05e7\u05e8\u05d0\u05d4 \u05e7\u05d5\u05dc\u05d9\u05ea. \u05e0\u05e1\u05d4 \u05d1-Chrome.');
    return;
  }
  // ודא שהקולות נטענו
  loadJpVoice();
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(jp);
  if (jpVoice){
    u.voice = jpVoice;
    u.lang = jpVoice.lang;
  } else {
    u.lang = 'ja-JP';
  }
  u.rate = 0.8;
  u.pitch = 1.0;
  document.querySelectorAll('.ph-play').forEach(function(b){ b.classList.remove('playing'); });
  if (btn){
    btn.classList.add('playing');
    u.onend = function(){ btn.classList.remove('playing'); };
    u.onerror = function(){ btn.classList.remove('playing'); };
  }
  // עיכוב קטן לעקיפת באג ב-Chrome/Samsung שלא משמיע מיד
  setTimeout(function(){ speechSynthesis.speak(u); }, 60);

  // אם אין קול יפני — הודע פעם אחת
  if (!jpVoice && !window._jpVoiceWarned){
    window._jpVoiceWarned = true;
    setTimeout(function(){
      var note = document.getElementById('ph-voice-note');
      if (note) note.style.display = 'block';
    }, 200);
  }
};

function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

window.jrStart = function(mode){
  jrMode = mode;
  var ed = document.getElementById('jr-editor');
  ed.classList.add('on');
  var cw = document.getElementById('jr-canvas-wrap');
  var tx = document.getElementById('jr-text');
  if (mode === 'draw'){
    cw.classList.remove('hidden');
    tx.style.display = 'none';
    setTimeout(jrInitCanvas, 50);
  } else {
    cw.classList.add('hidden');
    tx.style.display = '';
  }
  ed.scrollIntoView({behavior:'smooth', block:'center'});
};

window.jrCancel = function(){
  document.getElementById('jr-editor').classList.remove('on');
  document.getElementById('jr-title').value = '';
  document.getElementById('jr-text').value = '';
  jrMode = null;
};

function jrInitCanvas(){
  jrCanvas = document.getElementById('jr-canvas');
  if (!jrCanvas) return;
  var wrap = document.getElementById('jr-canvas-wrap');
  var w = wrap.clientWidth;
  jrCanvas.width = w;
  jrCanvas.height = 320;
  jrCanvas.style.width = w + 'px';
  jrCanvas.style.height = '320px';
  jrCtx = jrCanvas.getContext('2d');
  jrCtx.fillStyle = '#fffef9';
  jrCtx.fillRect(0,0,jrCanvas.width,jrCanvas.height);
  jrCtx.lineCap = 'round';
  jrCtx.lineJoin = 'round';

  function pos(e){
    var r = jrCanvas.getBoundingClientRect();
    var t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }
  function start(e){ e.preventDefault(); jrDrawing = true; var p = pos(e); jrCtx.beginPath(); jrCtx.moveTo(p.x,p.y); }
  function move(e){
    if (!jrDrawing) return; e.preventDefault();
    var p = pos(e);
    // S Pen לחץ — אם נתמך
    var pressure = (e.touches && e.touches[0] && e.touches[0].force) ? e.touches[0].force : (e.pressure || 0.5);
    jrCtx.strokeStyle = jrErasing ? '#fffef9' : jrColor;
    jrCtx.lineWidth = jrErasing ? 18 : (jrPenSize + pressure*3);
    jrCtx.lineTo(p.x,p.y); jrCtx.stroke();
  }
  function end(e){ jrDrawing = false; }

  // pointer events — תומך ב-S Pen, עכבר ומגע
  jrCanvas.onpointerdown = start;
  jrCanvas.onpointermove = move;
  jrCanvas.onpointerup = end;
  jrCanvas.onpointerleave = end;
}

window.jrSetPen = function(){ jrErasing=false; document.getElementById('jr-pen').classList.add('on'); document.getElementById('jr-eraser').classList.remove('on'); };
window.jrSetEraser = function(){ jrErasing=true; document.getElementById('jr-eraser').classList.add('on'); document.getElementById('jr-pen').classList.remove('on'); };
window.jrSetColor = function(el,c){ jrColor=c; jrErasing=false; document.querySelectorAll('.jr-color').forEach(function(x){x.classList.remove('on');}); el.classList.add('on'); document.getElementById('jr-pen').classList.add('on'); document.getElementById('jr-eraser').classList.remove('on'); };
window.jrClearCanvas = function(){ if(jrCtx){ jrCtx.fillStyle='#fffef9'; jrCtx.fillRect(0,0,jrCanvas.width,jrCanvas.height); } };

window.jrSave = function(){
  var title = document.getElementById('jr-title').value.trim();
  var now = new Date();
  var dateStr = now.getDate()+'/'+(now.getMonth()+1)+'/'+now.getFullYear()+' '+
    ('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
  var entry = { id: Date.now(), title: title, date: dateStr, type: jrMode };
  if (jrMode === 'draw'){
    if (!jrCanvas) { alert('\u05d0\u05d9\u05df \u05e6\u05d9\u05d5\u05e8'); return; }
    entry.img = jrCanvas.toDataURL('image/png');
  } else {
    var txt = document.getElementById('jr-text').value.trim();
    if (!txt && !title){ alert('\u05db\u05ea\u05d5\u05d1 \u05de\u05e9\u05d4\u05d5 \u05ea\u05d7\u05d9\u05dc\u05d4'); return; }
    entry.text = txt;
  }
  JOURNAL.push(entry);
  saveJournal();
  jrCancel();
  renderJournal();
};

window.delJournal = function(id){

  JOURNAL = JOURNAL.filter(function(e){ return e.id !== id; });

  renderJournal();
};

};

// ── COUNTDOWN ──
function updateCountdown() {
  const FLIGHT = new Date('2026-08-18T00:00:00');
  const ARRIVAL = new Date('2026-08-19T00:00:00');
  const RETURN = new Date('2026-09-03T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  const msDay = 86400000;
  const daysToFlight = Math.round((FLIGHT-now)/msDay);
  const daysToReturn = Math.round((RETURN-now)/msDay);
  const cdEl=document.getElementById('countdown');
  const numEl=document.getElementById('cd-num');
  const txtEl=document.getElementById('cd-text');
  const subEl=document.getElementById('cd-sub');
  if(daysToFlight>0){numEl.textContent=daysToFlight;txtEl.textContent='ימים לטיסה ✈️';subEl.textContent='18 אוגוסט 2026';cdEl.classList.remove('arrived');}
  else if(daysToReturn>=0){numEl.textContent='יום '+Math.max(1,(Math.round((now-ARRIVAL)/msDay)+1));txtEl.textContent='🗾 אנחנו ביפן!';subEl.textContent=daysToReturn+' ימים לחזרה';cdEl.classList.add('arrived');}
  else{numEl.textContent='🏠';txtEl.textContent='חזרנו בשלום!';subEl.textContent='';cdEl.classList.add('arrived');}
}
updateCountdown();
